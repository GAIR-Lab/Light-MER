<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Light-MER overview</title>
  <desc id="desc">A two-panel robot illustration. The left panel shows a large model compressed into a smaller but strong model. The right panel shows a large teacher robot teaching a small student robot through SWD-H hidden-state distillation.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fbff"/>
      <stop offset="0.55" stop-color="#eef8f5"/>
      <stop offset="1" stop-color="#fff7e8"/>
    </linearGradient>
    <linearGradient id="panelLeft" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef7ff"/>
    </linearGradient>
    <linearGradient id="panelRight" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f3fbf0"/>
    </linearGradient>
    <linearGradient id="robotBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#dff2ff"/>
      <stop offset="1" stop-color="#7cc7f2"/>
    </linearGradient>
    <linearGradient id="robotGreen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e5fbd6"/>
      <stop offset="1" stop-color="#79cf78"/>
    </linearGradient>
    <linearGradient id="robotGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff0b8"/>
      <stop offset="1" stop-color="#f7bd3a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#17324a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 2 L 16 9 L 2 16 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="18" markerHeight="18" refX="15" refY="9" orient="auto" markerUnits="strokeWidth">
      <path d="M 2 2 L 16 9 L 2 16 z" fill="#15936d"/>
    </marker>
    <style>
      .title { font: 800 42px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #102033; letter-spacing: 0; }
      .subtitle { font: 500 21px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #506176; letter-spacing: 0; }
      .panelTitle { font: 800 32px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #142033; letter-spacing: 0; }
      .panelSub { font: 600 19px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #607086; letter-spacing: 0; }
      .label { font: 800 18px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1b2a3d; letter-spacing: 0; }
      .tiny { font: 700 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #617186; letter-spacing: 0; }
      .badgeText { font: 800 20px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1d2b3f; letter-spacing: 0; }
      .badgeSub { font: 600 14px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #6d7b8d; letter-spacing: 0; }
      .mono { font: 800 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #0f766e; letter-spacing: 0; }
    </style>
  </defs>

  <rect width="1600" height="720" rx="44" fill="url(#bg)"/>
  <circle cx="130" cy="124" r="78" fill="#d7ecff" opacity="0.55"/>
  <circle cx="1465" cy="610" r="96" fill="#ffe8ab" opacity="0.45"/>
  <circle cx="770" cy="660" r="52" fill="#d8f5df" opacity="0.55"/>

  <text x="80" y="82" class="title">Light-MER Stage 1</text>
  <text x="80" y="116" class="subtitle">Small, strong, and taught by a large multimodal emotion model</text>

  <rect x="60" y="155" width="720" height="505" rx="28" fill="url(#panelLeft)" stroke="#d7e4f3" stroke-width="2" filter="url(#shadow)"/>
  <rect x="820" y="155" width="720" height="505" rx="28" fill="url(#panelRight)" stroke="#d9ead7" stroke-width="2" filter="url(#shadow)"/>

  <text x="315" y="212" class="panelTitle">Large -&gt; Lightweight</text>
  <text x="315" y="245" class="panelSub">Small model, strong MER ability</text>

  <g transform="translate(172 322) scale(1.18)">
    <line x1="0" y1="-112" x2="0" y2="-140" stroke="#59728d" stroke-width="7" stroke-linecap="round"/>
    <circle cx="0" cy="-151" r="12" fill="#f7bd3a" stroke="#1b2a3d" stroke-width="5"/>
    <rect x="-78" y="-112" width="156" height="118" rx="32" fill="url(#robotBlue)" stroke="#1b2a3d" stroke-width="6"/>
    <rect x="-52" y="-78" width="104" height="39" rx="19" fill="#102033"/>
    <circle cx="-28" cy="-58" r="8" fill="#7dd3fc"/>
    <circle cx="28" cy="-58" r="8" fill="#7dd3fc"/>
    <path d="M -24 -28 C -8 -15 10 -15 26 -28" fill="none" stroke="#102033" stroke-width="5" stroke-linecap="round"/>
    <rect x="-62" y="18" width="124" height="126" rx="26" fill="#ffffff" stroke="#1b2a3d" stroke-width="6"/>
    <rect x="-34" y="52" width="68" height="22" rx="11" fill="#2b7fff" opacity="0.85"/>
    <path d="M -68 45 L -112 72" stroke="#1b2a3d" stroke-width="10" stroke-linecap="round"/>
    <path d="M 68 45 L 112 72" stroke="#1b2a3d" stroke-width="10" stroke-linecap="round"/>
    <path d="M -36 144 L -48 186" stroke="#1b2a3d" stroke-width="10" stroke-linecap="round"/>
    <path d="M 36 144 L 48 186" stroke="#1b2a3d" stroke-width="10" stroke-linecap="round"/>
    <rect x="-116" y="68" width="45" height="34" rx="16" fill="#fff4ca" stroke="#1b2a3d" stroke-width="5"/>
    <rect x="71" y="68" width="45" height="34" rx="16" fill="#fff4ca" stroke="#1b2a3d" stroke-width="5"/>
  </g>
  <text x="105" y="565" class="label">Qwen3-8B teacher</text>
  <text x="120" y="590" class="tiny">strong but costly</text>

  <path d="M 357 405 C 421 365 464 365 527 405" fill="none" stroke="#2563eb" stroke-width="10" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="377" y="309" width="150" height="54" rx="27" fill="#ffffff" stroke="#bed4f4" stroke-width="2"/>
  <text x="411" y="342" class="mono">SWD-H</text>
  <circle cx="401" cy="393" r="6" fill="#2563eb"/>
  <circle cx="426" cy="380" r="6" fill="#2dd4bf"/>
  <circle cx="451" cy="398" r="6" fill="#f7bd3a"/>
  <circle cx="476" cy="382" r="6" fill="#2563eb"/>
  <circle cx="501" cy="396" r="6" fill="#2dd4bf"/>

  <g transform="translate(610 363) scale(0.86)">
    <line x1="0" y1="-112" x2="0" y2="-140" stroke="#59728d" stroke-width="7" stroke-linecap="round"/>
    <circle cx="0" cy="-151" r="12" fill="#79cf78" stroke="#1b2a3d" stroke-width="5"/>
    <rect x="-78" y="-112" width="156" height="118" rx="32" fill="url(#robotGreen)" stroke="#1b2a3d" stroke-width="6"/>
    <rect x="-52" y="-78" width="104" height="39" rx="19" fill="#102033"/>
    <circle cx="-28" cy="-58" r="8" fill="#baf7d0"/>
    <circle cx="28" cy="-58" r="8" fill="#baf7d0"/>
    <path d="M -25 -27 C -8 -11 10 -11 27 -27" fill="none" stroke="#102033" stroke-width="5" stroke-linecap="round"/>
    <rect x="-62" y="18" width="124" height="126" rx="26" fill="#ffffff" stroke="#1b2a3d" stroke-width="6"/>
    <path d="M -26 58 L -5 78 L 36 39" fill="none" stroke="#15936d" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M -68 45 L -114 25" stroke="#1b2a3d" stroke-width="10" stroke-linecap="round"/>
    <path d="M 68 45 L 114 25" stroke="#1b2a3d" stroke-width="10" stroke-linecap="round"/>
    <path d="M -36 144 L -48 186" stroke="#1b2a3d" stroke-width="10" stroke-linecap="round"/>
    <path d="M 36 144 L 48 186" stroke="#1b2a3d" stroke-width="10" stroke-linecap="round"/>
    <circle cx="-122" cy="21" r="20" fill="#fff4ca" stroke="#1b2a3d" stroke-width="5"/>
    <circle cx="122" cy="21" r="20" fill="#fff4ca" stroke="#1b2a3d" stroke-width="5"/>
  </g>
  <text x="541" y="565" class="label">Qwen3-0.6B student</text>
  <text x="575" y="590" class="tiny">small and strong</text>

  <g transform="translate(101 610)">
    <rect x="0" y="0" width="178" height="66" rx="19" fill="#ffffff" stroke="#d6e3f2"/>
    <text x="25" y="31" class="badgeText">11x fewer</text>
    <text x="28" y="52" class="badgeSub">parameters</text>
  </g>
  <g transform="translate(300 610)">
    <rect x="0" y="0" width="178" height="66" rx="19" fill="#ffffff" stroke="#d6e3f2"/>
    <text x="36" y="31" class="badgeText">2.54 GB</text>
    <text x="45" y="52" class="badgeSub">peak memory</text>
  </g>
  <g transform="translate(499 610)">
    <rect x="0" y="0" width="178" height="66" rx="19" fill="#ffffff" stroke="#d6e3f2"/>
    <text x="35" y="31" class="badgeText">74.16</text>
    <text x="58" y="52" class="badgeSub">mean score</text>
  </g>

  <text x="1110" y="212" class="panelTitle">Large teaches small</text>
  <text x="1110" y="245" class="panelSub">Hidden-state geometry transfer</text>

  <g transform="translate(998 330) scale(1.02)">
    <line x1="0" y1="-112" x2="0" y2="-140" stroke="#6b5d38" stroke-width="7" stroke-linecap="round"/>
    <circle cx="0" cy="-151" r="12" fill="#f7bd3a" stroke="#1b2a3d" stroke-width="5"/>
    <rect x="-78" y="-112" width="156" height="118" rx="32" fill="url(#robotGold)" stroke="#1b2a3d" stroke-width="6"/>
    <rect x="-52" y="-78" width="104" height="39" rx="19" fill="#102033"/>
    <circle cx="-28" cy="-58" r="8" fill="#ffe8a4"/>
    <circle cx="28" cy="-58" r="8" fill="#ffe8a4"/>
    <path d="M -24 -28 C -8 -16 10 -16 26 -28" fill="none" stroke="#102033" stroke-width="5" stroke-linecap="round"/>
    <rect x="-62" y="18" width="124" height="126" rx="26" fill="#ffffff" stroke="#1b2a3d" stroke-width="6"/>
    <rect x="-31" y="50" width="62" height="18" rx="9" fill="#f7bd3a"/>
    <path d="M -68 45 L -112 72" stroke="#1b2a3d" stroke-width="10" stroke-linecap="round"/>
    <path d="M 68 45 L 139 8" stroke="#1b2a3d" stroke-width="10" stroke-linecap="round"/>
    <path d="M -36 144 L -48 186" stroke="#1b2a3d" stroke-width="10" stroke-linecap="round"/>
    <path d="M 36 144 L 48 186" stroke="#1b2a3d" stroke-width="10" stroke-linecap="round"/>
    <rect x="-116" y="68" width="45" height="34" rx="16" fill="#ffffff" stroke="#1b2a3d" stroke-width="5"/>
    <circle cx="147" cy="4" r="18" fill="#ffffff" stroke="#1b2a3d" stroke-width="5"/>
  </g>
  <text x="918" y="565" class="label">Frozen 8B teacher</text>
  <text x="934" y="590" class="tiny">emotion reasoning</text>

  <g transform="translate(1180 295)">
    <rect x="0" y="0" width="188" height="138" rx="18" fill="#102033" stroke="#27415c" stroke-width="5"/>
    <text x="40" y="39" class="mono" fill="#7dd3fc">SWD-H</text>
    <circle cx="48" cy="80" r="7" fill="#7dd3fc"/>
    <circle cx="76" cy="64" r="7" fill="#2dd4bf"/>
    <circle cx="104" cy="91" r="7" fill="#f7bd3a"/>
    <circle cx="132" cy="71" r="7" fill="#7dd3fc"/>
    <circle cx="154" cy="101" r="7" fill="#2dd4bf"/>
    <path d="M 48 80 L 76 64 L 104 91 L 132 71 L 154 101" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    <text x="31" y="124" style="font: 700 15px Inter, ui-sans-serif, system-ui, sans-serif; fill: #cfe7ff;">hidden states</text>
  </g>

  <path d="M 1148 336 C 1165 320 1173 315 1185 314" fill="none" stroke="#15936d" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowGreen)"/>
  <path d="M 1365 364 C 1402 374 1420 399 1428 427" fill="none" stroke="#15936d" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowGreen)"/>

  <g transform="translate(1438 470) scale(0.64)">
    <line x1="0" y1="-112" x2="0" y2="-140" stroke="#59728d" stroke-width="7" stroke-linecap="round"/>
    <circle cx="0" cy="-151" r="12" fill="#79cf78" stroke="#1b2a3d" stroke-width="5"/>
    <rect x="-78" y="-112" width="156" height="118" rx="32" fill="url(#robotGreen)" stroke="#1b2a3d" stroke-width="6"/>
    <rect x="-52" y="-78" width="104" height="39" rx="19" fill="#102033"/>
    <circle cx="-28" cy="-58" r="8" fill="#baf7d0"/>
    <circle cx="28" cy="-58" r="8" fill="#baf7d0"/>
    <path d="M -22 -28 C -8 -13 8 -13 22 -28" fill="none" stroke="#102033" stroke-width="5" stroke-linecap="round"/>
    <rect x="-62" y="18" width="124" height="126" rx="26" fill="#ffffff" stroke="#1b2a3d" stroke-width="6"/>
    <path d="M -30 55 L 0 31 L 31 55 L 17 95 L -17 95 z" fill="#e5fbd6" stroke="#15936d" stroke-width="6" stroke-linejoin="round"/>
    <path d="M -68 45 L -110 65" stroke="#1b2a3d" stroke-width="10" stroke-linecap="round"/>
    <path d="M 68 45 L 110 65" stroke="#1b2a3d" stroke-width="10" stroke-linecap="round"/>
    <path d="M -36 144 L -48 186" stroke="#1b2a3d" stroke-width="10" stroke-linecap="round"/>
    <path d="M 36 144 L 48 186" stroke="#1b2a3d" stroke-width="10" stroke-linecap="round"/>
    <rect x="-114" y="58" width="45" height="34" rx="16" fill="#fff4ca" stroke="#1b2a3d" stroke-width="5"/>
    <rect x="69" y="58" width="45" height="34" rx="16" fill="#fff4ca" stroke="#1b2a3d" stroke-width="5"/>
  </g>
  <text x="1356" y="565" class="label">0.6B student</text>
  <text x="1355" y="590" class="tiny">deployment ready</text>

  <g transform="translate(885 618)">
    <rect x="0" y="0" width="598" height="38" rx="19" fill="#ffffff" stroke="#d8ead5"/>
    <circle cx="30" cy="19" r="8" fill="#f7bd3a"/>
    <text x="50" y="25" class="tiny">Teacher gives structure, student keeps the deployable form.</text>
  </g>
</svg>
